<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Place</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__title">
      <span class="topbar__dot"></span>
      <h1>place</h1>
      <span class="topbar__count" id="onlineCount">–</span>
    </div>
    <div class="topbar__status" id="status">verbinde…</div>
  </header>

  <main class="stage" id="stage">
    <canvas id="canvas"></canvas>
  </main>

  <footer class="dock">
    <div class="cooldown" id="cooldownWrap" hidden>
      <div class="cooldown__bar" id="cooldownBar"></div>
      <span class="cooldown__label" id="cooldownLabel"></span>
    </div>
    <div class="palette" id="palette"></div>
  </footer>

  <div class="toast" id="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
